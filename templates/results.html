<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultado | Analizador IA</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Análisis Completado</h1>
        
        <h3 style="color: var(--text-muted); font-size: 0.9rem; text-transform: uppercase;">Texto procesado:</h3>
        <blockquote>"{{ review }}"</blockquote>
        
        <h3 style="color: var(--text-muted); font-size: 0.9rem; text-transform: uppercase; margin-top: 2rem;">Veredicto del Modelo:</h3>
        
        <div style="text-align: center; margin: 2rem 0;">
            {% if prediction == 'positive' %}
                <span class="badge positive">🟢 Positivo</span>
            {% else %}
                <span class="badge negative">🔴 Negativo</span>
            {% endif %}
        </div>
        
        <div class="nav-links">
            <a href="/">&larr; Analizar otra reseña</a> &nbsp;|&nbsp; <a href="/dashboard">Ir al Dashboard</a>
        </div>
    </div>
</body>
</html>
